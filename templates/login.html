<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c3e50">
    <title>IT Equipment Inventory</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --dark: #34495e;
            --border: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            justify-content: flex-end;
            z-index: 10;
        }

        .btn-login {
            padding: 10px 24px;
            border: 2px solid white;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-login:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .landing-center {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
        }

        .landing-card {
            text-align: center;
            max-width: 520px;
            width: 100%;
        }

        .landing-card h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 12px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .landing-card p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-continue {
            padding: 16px 48px;
            border: 2px solid white;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-continue:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.3);
        }

        .btn-continue:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Login Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 36px;
            border-radius: 12px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            color: var(--primary);
            font-size: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--dark);
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--danger);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            background: var(--secondary);
            color: white;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #2980b9;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .alert.show { display: block; }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .login-subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button type="button" class="btn-login" onclick="openLoginModal()">Login</button>
    </div>

    <div class="landing-center">
        <div class="landing-card">
            <h1>IT Equipment Inventory</h1>
            <button type="button" class="btn-continue" id="continueBtn" onclick="continueAsViewer()">Continue</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Admin Login</h2>
                <button type="button" class="close-btn" onclick="closeLoginModal()">&times;</button>
            </div>
            <p class="login-subtitle">Sign in to manage inventory entries</p>
            <div id="alert" class="alert"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" required autocomplete="username" placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="Enter your password">
                </div>
                <button type="submit" class="btn" id="loginBtn">Sign In</button>
            </form>
        </div>
    </div>

    <script>
        const alertEl = document.getElementById('alert');
        const loginModal = document.getElementById('loginModal');
        const loginForm = document.getElementById('loginForm');

        function showAlert(message) {
            alertEl.textContent = message;
            alertEl.className = 'alert alert-danger show';
        }

        function clearAlert() {
            alertEl.classList.remove('show');
        }

        function openLoginModal() {
            loginModal.classList.add('show');
            clearAlert();
        }

        function closeLoginModal() {
            loginModal.classList.remove('show');
            clearAlert();
        }

        async function continueAsViewer() {
            const btn = document.getElementById('continueBtn');
            btn.disabled = true;
            btn.textContent = 'Loading...';

            try {
                const response = await fetch('/api/auth/viewer', {
                    method: 'POST',
                    credentials: 'same-origin'
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Failed to continue');
                }

                window.location.href = '/';
            } catch (error) {
                alert(error.message);
                btn.disabled = false;
                btn.textContent = 'Continue';
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            clearAlert();

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        username: document.getElementById('loginUsername').value,
                        password: document.getElementById('loginPassword').value
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                window.location.href = '/';
            } catch (error) {
                showAlert(error.message);
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });

        loginModal.addEventListener('click', (e) => {
            if (e.target === loginModal) closeLoginModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLoginModal();
        });
    </script>
</body>
</html>
